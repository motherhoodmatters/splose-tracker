<script>
var G = {
  clients: [], removed: [], manual: {}, newTask: {a:'', n:''},
  syncing: false, error: null, view: 'list', sel: null, filt: 'all', q: '', syncedAt: null,
  tab: 'clients', students: [], studentSyncedAt: null, studentSyncing: false, studentView: 'list', studentSel: null, studentQ: '', onboarding: [], onboardingSyncedAt: null, onboardingSyncing: false, onboardingView: 'list', onboardingSel: null, editingTask: null, studentOnboarding: [], soSyncedAt: null, soSyncing: false, soView: 'list', soSel: null
};

function addBiz(s,n){var d=new Date(s+'T00:00:00');var c=0;while(c<n){d.setDate(d.getDate()+1);if(d.getDay()%6!==0)c++;}return d.toISOString().split('T')[0];}
function bizLeft(e){if(!e)return 10;var now=new Date();now.setHours(0,0,0,0);var end=new Date(e+'T00:00:00');if(now>end)return -1;var n=0,d=new Date(now);while(d<end){d.setDate(d.getDate()+1);if(d.getDay()%6!==0)n++;}return n;}
function fmtDate(s){if(!s)return '-';return new Date(s+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});}
function ago(iso){var m=Math.round((Date.now()-new Date(iso))/60000);if(m<1)return 'just now';if(m<60)return m+' min ago';return Math.round(m/60)+' hr ago';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function autoSt(c){if(!c.lastRealAppt)return 'rebook';var days=c.followupDays||10;var e=addBiz(c.lastRealAppt,days);var l=bizLeft(e);if(l<0)return 'discharge';if(l<=3)return 'checkin';return 'active';}
function getSt(c){return G.manual[c.id]||c.manualStatus||autoSt(c);}
function getEnd(c){if(!c.lastRealAppt)return null;return addBiz(c.lastRealAppt,c.followupDays||10);}
var SL={active:'Active',checkin:'Check-in needed',discharge:'Discharge',rebook:'Rebook needed'};
var SBC={active:'b-active',checkin:'b-checkin',discharge:'b-discharge',rebook:'b-rebook'};
var SC={active:'#2d7a3a',checkin:'#b85e00',discharge:'#b32020',rebook:'#5b21b6'};

function saveLocal(){}
function loadLocal(){}

function enrich(raw){
  return raw.filter(function(c){return G.removed.indexOf(c.id)<0;})
    .map(function(c){return Object.assign({},c,{st:getSt(c),end:getEnd(c)});});
}

function doStudentOnboardingSync(){
  fetch('/api/student-onboarding').then(function(r){return r.json();}).then(function(d){
    G.studentOnboarding=d.clients||[];
    G.soSyncedAt=d.syncedAt;
    render();
  });
}

function doAddStudentOnboarding(){
  G.soAddModal=true;G.soAddList=null;render();
  fetch('/api/students-list').then(function(r){return r.json();}).then(function(d){
    G.soAddList=d.students||[];render();
  });
}

function doAddSOFromExisting(name){
  var program=prompt('Enter program (LEP, Pathway 3, or leave blank):','');
  fetch('/api/student-onboarding/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,program:program||null})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok){G.studentOnboarding.push(d.student);G.soAddModal=false;render();}
    });
}

function doAddSONew(){
  var name=document.getElementById('soNewName').value.trim();
  if(!name)return;
  var program=prompt('Enter program (LEP, Pathway 3, or leave blank):','');
  fetch('/api/student-onboarding/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,program:program||null})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok){G.studentOnboarding.push(d.student);G.soAddModal=false;render();}
    });
}

function renderSOAddModal(){
  if(!G.soAddModal)return '';
  var html='<div style="position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this){G.soAddModal=false;render();}">';
  html+='<div style="background:white;border-radius:16px;padding:24px;width:100%;max-width:420px;margin:20px;max-height:80vh;overflow-y:auto;">';
  html+='<h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">Add student to onboarding</h2>';
  html+='<div style="margin-bottom:16px;"><label style="display:block;font-size:13px;font-weight:500;margin-bottom:6px;">New student name</label>';
  html+='<div style="display:flex;gap:8px;"><input id="soNewName" type="text" placeholder="Full name" style="flex:1;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;" />';
  html+='<button class="pri" onclick="doAddSONew()">Add</button></div></div>';
  html+='<div style="font-size:13px;font-weight:500;color:#64748b;margin:16px 0 8px;border-top:1px solid #f1f5f9;padding-top:16px;">Or select from existing students</div>';
  if(G.soAddList===null){
    html+='<div style="color:#94a3b8;font-size:13px;">Loading students...</div>';
  } else if(!G.soAddList.length){
    html+='<div style="color:#94a3b8;font-size:13px;">No existing students found.</div>';
  } else {
    html+='<div style="display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto;">';
    G.soAddList.forEach(function(s){
      html+='<button onclick="doAddSOFromExisting(\''+esc(s.name).replace(/'/g,"\\'")+'\')" style="text-align:left;padding:8px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;">'+esc(s.name)+'</button>';
    });
    html+='</div>';
  }
  html+='<button onclick="G.soAddModal=false;render()" style="margin-top:16px;width:100%;padding:9px;background:none;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;">Cancel</button>';
  html+='</div></div>';
  return html;
}

function doCompleteStudentOnboarding(id){
  if(!confirm('Mark onboarding complete and move to Students list?'))return;
  fetch('/api/student-onboarding/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:id})})
    .then(function(){
      G.studentOnboarding=G.studentOnboarding.filter(function(c){return c.id!==id;});
      G.soView='list';render();
    });
}
function doOnboardingSync(){
  G.onboardingSyncing=true;render();
  fetch('/api/onboarding').then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error);
    G.onboarding=d.clients||[];
    G.onboardingSyncedAt=d.syncedAt;
    G.onboardingSyncing=false;render();
  }).catch(function(e){G.onboardingSyncing=false;render();});
}
function doStudentSync(){
  G.studentSyncing=true;render();
  fetch('/api/students').then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error);
    G.students=d.students||[];
    G.studentSyncedAt=d.syncedAt;
    G.studentSyncing=false;render();
  }).catch(function(e){G.studentSyncing=false;render();});
}
function doSync(){
  G.syncing=true;G.error=null;render();
  fetch('/api/clients').then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error);
    
    G.clients=enrich(d.clients||[]);
    G.syncedAt=d.syncedAt;
    G.syncing=false;render();
  }).catch(function(e){G.error=e.message;G.syncing=false;render();});
}

function doSaveStudentTask(){
  if(!G.newTask.a||!G.studentSel)return;
  var c=G.students.find(function(x){return x.id===G.studentSel;});
  if(!c)return;
  var tasks=(c.tasks||[]).concat([{id:''+Date.now(),assignee:G.newTask.a,note:G.newTask.n,done:false}]);
  fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:G.studentSel,tasks:tasks})});
  G.students=G.students.map(function(x){return x.id===G.studentSel?Object.assign({},x,{tasks:tasks}):x;});
  G.newTask={a:'',n:''};render();
}
function doSaveTask(){
  if(!G.newTask.a||!G.sel)return;
  var c=G.clients.find(function(x){return x.id===G.sel;});
  if(!c)return;
  var tasks=(c.tasks||[]).concat([{id:''+Date.now(),a:G.newTask.a,n:G.newTask.n,done:false}]);
  fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:G.sel,tasks:tasks})});
  G.clients=G.clients.map(function(x){return x.id===G.sel?Object.assign({},x,{tasks:tasks}):x;});
  G.newTask={a:'',n:''};render();
}

function doToggleTask(cid,tid){
  var c=G.clients.find(function(x){return x.id===cid;});if(!c)return;
  var tasks=(c.tasks||[]).map(function(t){return t.id===tid?Object.assign({},t,{done:!t.done}):t;});
  fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:cid,tasks:tasks})});
  G.clients=G.clients.map(function(x){return x.id===cid?Object.assign({},x,{tasks:tasks}):x;});render();
}

function doRemoveTask(cid,tid){
  var c=G.clients.find(function(x){return x.id===cid;});if(!c)return;
  var tasks=(c.tasks||[]).filter(function(t){return t.id!==tid;});
  fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:cid,tasks:tasks})});
  G.clients=G.clients.map(function(x){return x.id===cid?Object.assign({},x,{tasks:tasks}):x;});render();
}

  var s=G.students.find(function(x){return x.id===cid;});if(!s)return;
  var tasks=(s.tasks||[]).map(function(t){return t.id===tid?Object.assign({},t,{done:!t.done}):t;});
  await fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:cid,tasks:tasks})});

}
async function doRemoveStudentTask(cid,tid){
  var s=G.students.find(function(x){return x.id===cid;});if(!s)return;
  var tasks=(s.tasks||[]).filter(function(t){return t.id!==tid;});
  await fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:cid,tasks:tasks})});
  G.students=G.students.map(function(x){return x.id===cid?Object.assign({},x,{tasks:tasks}):x;});render();

function doMoveStudentToOnboarding(id,name){
  if(!confirm('Move '+name+' to Student Onboarding? They will keep appearing in Students too.'))return;
  var program=prompt('Enter program (LEP, Pathway 3, or leave blank):','');
  fetch('/api/student-onboarding/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,program:program||null})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok){alert(name+' added to Student Onboarding.');}
    });
}
function doSetStudentProgram(id,program){
  var cur=G.students.find(function(x){return x.id===id;});
  if(!cur)return;
  var progs=cur.programs?cur.programs.slice():[];
  var idx=progs.indexOf(program);
  if(idx>=0){progs.splice(idx,1);}else{progs.push(program);}
  G.students=G.students.map(function(x){return x.id===id?Object.assign({},x,{programs:progs}):x;});
  fetch('/api/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:id,status:'programs_'+progs.join(',')})});
  render();
}

async function doEditTask(cid,tid,newNote,listType){
  var list=listType==='onboarding'?G.onboarding:listType==='studentOnboarding'?G.studentOnboarding:listType==='students'?G.students:G.clients;
  var c=list.find(function(x){return x.id===cid;});if(!c)return;
  var tasks=(c.tasks||[]).map(function(t){return t.id===tid?Object.assign({},t,{n:newNote}):t;});
  await fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:cid,tasks:tasks})});
  if(listType==='onboarding'||listType==='studentOnboarding'){await fetch('/api/onboarding-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:cid,tasks:tasks})});if(listType==='studentOnboarding'){G.studentOnboarding=G.studentOnboarding.map(function(x){return x.id===cid?Object.assign({},x,{tasks:tasks}):x;});}else{G.onboarding=G.onboarding.map(function(x){return x.id===cid?Object.assign({},x,{tasks:tasks}):x;});}}
  else if(listType==='students')G.students=G.students.map(function(x){return x.id===cid?Object.assign({},x,{tasks:tasks}):x;});
  else G.clients=G.clients.map(function(x){return x.id===cid?Object.assign({},x,{tasks:tasks}):x;});
  G.editingTask=null;render();
}

function doSetProgram(id,program){
  var cur=G.studentOnboarding.find(function(x){return x.id===id;});
  if(!cur)return;
  var progs=cur.programs?cur.programs.slice():(cur.program?[cur.program]:[]);
  var idx=progs.indexOf(program);
  if(idx>=0){progs.splice(idx,1);}else{progs.push(program);}
  G.studentOnboarding=G.studentOnboarding.map(function(x){return x.id===id?Object.assign({},x,{programs:progs,program:progs[0]||null}):x;});
  fetch('/api/student-onboarding/program',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:id,program:progs.join(',')})});
  render();
}

function renderProgBadges(progs){

    'Prospective':{bg:'#e0f2fe',color:'#0369a1'},

  var el=document.getElementById('studentCards');
  if(!el)return;
  var list=G.students.filter(function(s){return !G.studentQ||s.name.toLowerCase().includes(G.studentQ.toLowerCase());}).sort(function(a,b){
  var aHold=a.programs&&a.programs.indexOf('Hold')>=0;
  var bHold=b.programs&&b.programs.indexOf('Hold')>=0;
  if(aHold&&!bHold)return 1;
  if(!aHold&&bHold)return -1;
  var da=a.appointments&&a.appointments.length?a.appointments[0].date:'';
  var db=b.appointments&&b.appointments.length?b.appointments[0].date:'';
  return db>da?1:db<da?-1:0;
});
  if(!list.length){el.innerHTML='<div style="padding:20px;text-align:center;color:#94a3b8;">No students found</div>';return;}
  var html='';
  list.forEach(function(s){
    var pending=(s.tasks||[]).filter(function(t){return !t.done;});

function doSetFollowupDays(id,current){
  var input=prompt('Set follow-up window in business days for this client (default is 10):',current);
  if(input===null)return;
  var days=input.trim()===''?null:Number(input);
  if(input.trim()!==''&&(isNaN(days)||days<1)){alert('Please enter a valid number of days');return;}
  G.clients=G.clients.map(function(c){if(c.id!==id)return c;var updated=Object.assign({},c,{followupDays:days});updated.end=getEnd(updated);updated.st=getSt(updated);return updated;});
  fetch('/api/followup-override',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:id,days:days})});

}
function doManualStatus(id,s){G.clients=G.clients.map(function(c){return c.id===id?Object.assign({},c,{manualStatus:s,st:s||autoSt(c)}):c;});fetch('/api/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:id,status:s})});render();}

function counts(){
  return{
    active:G.clients.filter(function(c){return c.st==='active';}).length,
    checkin:G.clients.filter(function(c){return c.st==='checkin';}).length,
    discharge:G.clients.filter(function(c){return c.st==='discharge';}).length,
    rebook:G.clients.filter(function(c){return c.st==='rebook';}).length
  };
}

function getList(){
  var order={checkin:0,discharge:1,rebook:2,active:3};
  return G.clients.filter(function(c){
    if(G.filt!=='all'&&c.st!==G.filt)return false;
    if(G.q&&!c.name.toLowerCase().includes(G.q.toLowerCase())&&!(c.practitioner||'').toLowerCase().includes(G.q.toLowerCase()))return false;
    return true;
  }).sort(function(a,b){
    var so=order[a.st]-order[b.st];
    if(so!==0)return so;
    var da=a.lastRealAppt||a.end||'';
    var db=b.lastRealAppt||b.end||'';
    return db>da?1:db<da?-1:0;
  });
}

  out+='<h3 class="sec">Contact history ('+appts.length+')</h3>';
  if(appts.length===0){out+='<div class="empty dashed">No contacts.</div>';}
  else{
    for(var ai=0;ai<appts.length;ai++){
      var ap=appts[ai];
      var isCall=ap.isCheckin;
      var isLatest=!isCall&&realAppts.length>0&&ap.id===realAppts[0].id;
      out+='<div class="ch-item">';
      out+='<div class="ch-icon '+(isCall?'ch-call':'ch-appt')+'">'+(isCall?'Call':'Appt')+'</div>';
      out+='<div style="flex:1"><div style="display:flex;justify-content:space-between">';
      out+='<span class="ch-name">'+(isCall?'Check-in call':'Appointment');
      if(isCall)out+='<span class="call-pill">call only</span>';
      if(isLatest)out+='<span class="latest-pill">latest</span>';
      out+='</span><span class="ch-date">'+fmtDate(ap.date)+'</span></div>';
      if(isLatest&&c.end)out+='<p class="ch-sub" style="color:'+SC[c.st]+';font-weight:500">Support: '+fmtDate(ap.date)+' to '+fmtDate(c.end)+'</p>';
      out+='</div></div>';
    }
  }
  return out;
}

function render(){
  var html;
  if(G.tab==='students'){
    html=G.studentView==='detail'?renderStudentDetail():renderStudentList();
  } else if(G.tab==='onboarding'){
    html=G.onboardingView==='detail'?renderOnboardingDetail():renderOnboardingList();
  } else if(G.tab==='studentOnboarding'){
    html=G.soView==='detail'?renderSODetail():renderSOList();
  } else {
    html=G.view==='detail'?renderDetail():renderList();
  }
  document.getElementById('root').innerHTML=html;
}

loadLocal();
doSync();
</script>
