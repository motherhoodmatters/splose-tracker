<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Follow-up Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:2rem 1rem}
h1{font-size:22px;font-weight:600}
.sub{font-size:13px;color:#888;margin-top:2px}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;gap:12px;flex-wrap:wrap}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync-info{font-size:12px;color:#888;text-align:right;line-height:1.4}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:#fff;border-radius:12px;padding:.9rem;cursor:pointer;border:1.5px solid transparent}
.stat:hover{border-color:#ddd}
.stat.on{border-color:#1a1a1a}
.stat-lbl{font-size:11px;color:#888;margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.stat-n{font-size:26px;font-weight:600}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.srch{position:relative;flex:1;min-width:200px}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4}
.srch input{padding-left:34px;width:100%}
input,select,textarea{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:#1a1a1a}
textarea{resize:vertical;min-height:70px}
.fb{font-size:13px;padding:6px 14px;border-radius:999px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer;white-space:nowrap}
.fb:hover{border-color:#aaa;color:#444}
.fb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.pri{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;font-family:inherit}
.pri:hover{opacity:.85}
.pri:disabled{opacity:.4;cursor:not-allowed}
.sec{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;background:#fff;color:#444;border:1px solid #ddd;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit}
.danger{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;background:#fff;color:#b32020;border:1px solid #f5c6c6;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit}
.danger:hover{background:#fce8e8}
.back{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:#888;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1.5rem;font-family:inherit}
.cards{display:flex;flex-direction:column;gap:8px}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#aaa}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-name{font-weight:600;font-size:15px;margin-bottom:3px}
.card-meta{font-size:12px;color:#888;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.card-right{text-align:right;flex-shrink:0}
.card-days{font-size:12px;color:#888;margin-top:4px}
.card-tasks{margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0;display:flex;flex-direction:column;gap:6px}
.task-row{display:flex;align-items:center;gap:8px;font-size:12px}
.task-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:3px 9px;border-radius:6px;white-space:nowrap}
.tag-felicity{background:#ede9fe;color:#5b21b6}
.tag-annie{background:#fce7f3;color:#9d174d}
.badge{display:inline-block;font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;white-space:nowrap}
.b-active{background:#e6f4ea;color:#2d7a3a}
.b-checkin{background:#fff3e0;color:#b85e00}
.b-discharge{background:#fce8e8;color:#b32020}
.b-rebook{background:#ede9fe;color:#5b21b6}
.det-box{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.mini{background:#f7f7f5;border-radius:8px;padding:10px 12px}
.mini p:first-child{font-size:11px;color:#888;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.mini p:last-child{font-size:13px;font-weight:600}
.prog{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:3px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-row span{font-size:12px;color:#888}
.section-box{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.section-box h3{font-size:14px;font-weight:600;margin-bottom:12px}
.assignee-btns{display:flex;gap:8px;margin-bottom:10px}
.assignee-btn{flex:1;padding:8px;border:1.5px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500}
.assignee-btn.sel-f{border-color:#5b21b6;background:#ede9fe;color:#5b21b6}
.assignee-btn.sel-a{border-color:#9d174d;background:#fce7f3;color:#9d174d}
.etask{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;margin-bottom:8px}
.etask-f{background:#f5f3ff;border:1px solid #ddd6fe}
.etask-a{background:#fdf2f8;border:1px solid #fbcfe8}
.done-btn{font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#888;white-space:nowrap;font-family:inherit}
.ch-item{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px}
.ch-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.ch-appt{background:#e3f0ff}
.ch-call{background:#fff3e0}
.ch-name{font-size:14px;font-weight:600}
.ch-sub{font-size:12px;color:#888;margin-top:2px}
.ch-date{font-size:12px;color:#888;white-space:nowrap}
.call-pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;background:#fff3e0;color:#b85e00;margin-left:6px;vertical-align:1px}
.latest-pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:#1a1a1a;color:#fff;margin-left:6px;vertical-align:1px}
.s-opts{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.s-opt{font-size:12px;padding:5px 12px;border-radius:6px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-family:inherit;font-weight:500}
.s-opt.s-on{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.empty{padding:3rem;text-align:center;color:#888;font-size:14px;line-height:1.8}
.dashed{border:1.5px dashed #ddd;border-radius:12px}
.err{background:#fce8e8;border:1px solid #f5c6c6;border-radius:10px;padding:1rem 1.25rem;font-size:14px;color:#b32020;margin-bottom:1rem}
h3.sec{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:.75rem}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<!-- v1780475348 -->
<script>
var G = {
  clients: [], removed: [], manual: {}, newTask: {a:'', n:''},
  syncing: false, error: null, view: 'list', sel: null, filt: 'all', q: '', syncedAt: null,
  tab: 'clients', students: [], studentSyncedAt: null, studentSyncing: false, studentView: 'list', studentSel: null, studentQ: ''
};

function addBiz(s,n){var d=new Date(s+'T00:00:00');var c=0;while(c<n){d.setDate(d.getDate()+1);if(d.getDay()%6!==0)c++;}return d.toISOString().split('T')[0];}
function bizLeft(e){if(!e)return 10;var now=new Date();now.setHours(0,0,0,0);var end=new Date(e+'T00:00:00');if(now>end)return -1;var n=0,d=new Date(now);while(d<end){d.setDate(d.getDate()+1);if(d.getDay()%6!==0)n++;}return n;}
function fmtDate(s){if(!s)return '-';return new Date(s+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});}
function ago(iso){var m=Math.round((Date.now()-new Date(iso))/60000);if(m<1)return 'just now';if(m<60)return m+' min ago';return Math.round(m/60)+' hr ago';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function autoSt(c){if(!c.lastRealAppt)return 'rebook';var e=addBiz(c.lastRealAppt,10);var l=bizLeft(e);if(l<0)return 'discharge';if(l<=3)return 'checkin';return 'active';}
function getSt(c){return G.manual[c.id]||c.manualStatus||autoSt(c);}
function getEnd(c){if(!c.lastRealAppt)return null;return addBiz(c.lastRealAppt,10);}
var SL={active:'Active',checkin:'Check-in needed',discharge:'Discharge',rebook:'Rebook needed'};
var SBC={active:'b-active',checkin:'b-checkin',discharge:'b-discharge',rebook:'b-rebook'};
var SC={active:'#2d7a3a',checkin:'#b85e00',discharge:'#b32020',rebook:'#5b21b6'};

function saveLocal(){}
function loadLocal(){}

function enrich(raw){
  return raw.filter(function(c){return G.removed.indexOf(c.id)<0;})
    .map(function(c){return Object.assign({},c,{st:getSt(c),end:getEnd(c)});});
}

function doStudentSync(){
  G.studentSyncing=true;render();
  fetch('/api/students').then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error);
    G.students=d.students||[];
    G.studentSyncedAt=d.syncedAt;
    G.studentSyncing=false;render();
  }).catch(function(e){G.studentSyncing=false;render();});
}
function doSync(){
  G.syncing=true;G.error=null;render();
  fetch('/api/clients').then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error);
    
    G.clients=enrich(d.clients||[]);
    G.syncedAt=d.syncedAt;
    G.syncing=false;render();
  }).catch(function(e){G.error=e.message;G.syncing=false;render();});
}

function doSaveStudentTask(){
  if(!G.newTask.a||!G.studentSel)return;
  var c=G.students.find(function(x){return x.id===G.studentSel;});
  if(!c)return;
  var tasks=(c.tasks||[]).concat([{id:''+Date.now(),assignee:G.newTask.a,note:G.newTask.n,done:false}]);
  fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:G.studentSel,tasks:tasks})});
  G.students=G.students.map(function(x){return x.id===G.studentSel?Object.assign({},x,{tasks:tasks}):x;});
  G.newTask={a:'',n:''};render();
}
function doSaveTask(){
  if(!G.newTask.a||!G.sel)return;
  var c=G.clients.find(function(x){return x.id===G.sel;});
  if(!c)return;
  var tasks=(c.tasks||[]).concat([{id:''+Date.now(),a:G.newTask.a,n:G.newTask.n,done:false}]);
  fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:G.sel,tasks:tasks})});
  G.clients=G.clients.map(function(x){return x.id===G.sel?Object.assign({},x,{tasks:tasks}):x;});
  G.newTask={a:'',n:''};render();
}

function doToggleTask(cid,tid){
  var c=G.clients.find(function(x){return x.id===cid;});if(!c)return;
  var tasks=(c.tasks||[]).map(function(t){return t.id===tid?Object.assign({},t,{done:!t.done}):t;});
  fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:cid,tasks:tasks})});
  G.clients=G.clients.map(function(x){return x.id===cid?Object.assign({},x,{tasks:tasks}):x;});render();
}

function doRemoveTask(cid,tid){
  var c=G.clients.find(function(x){return x.id===cid;});if(!c)return;
  var tasks=(c.tasks||[]).filter(function(t){return t.id!==tid;});
  fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:cid,tasks:tasks})});
  G.clients=G.clients.map(function(x){return x.id===cid?Object.assign({},x,{tasks:tasks}):x;});render();
}

function doRemoveStudent(id){
  if(!confirm('Remove this student from the tracker?'))return;
  fetch('/api/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:id})});
  G.students=G.students.filter(function(s){return s.id!==id;});
  G.studentView='list';render();
}
function doRemoveClient(id){
  if(!confirm('Remove this client from the tracker?'))return;
  fetch('/api/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:id})});
  G.clients=G.clients.filter(function(c){return c.id!==id;});
  G.view='list';render();
}

function doManualStatus(id,s){G.clients=G.clients.map(function(c){return c.id===id?Object.assign({},c,{manualStatus:s,st:s||autoSt(c)}):c;});fetch('/api/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:id,status:s})});render();}

function counts(){
  return{
    active:G.clients.filter(function(c){return c.st==='active';}).length,
    checkin:G.clients.filter(function(c){return c.st==='checkin';}).length,
    discharge:G.clients.filter(function(c){return c.st==='discharge';}).length,
    rebook:G.clients.filter(function(c){return c.st==='rebook';}).length
  };
}

function getList(){
  var order={checkin:0,discharge:1,rebook:2,active:3};
  return G.clients.filter(function(c){
    if(G.filt!=='all'&&c.st!==G.filt)return false;
    if(G.q&&!c.name.toLowerCase().includes(G.q.toLowerCase())&&!(c.practitioner||'').toLowerCase().includes(G.q.toLowerCase()))return false;
    return true;
  }).sort(function(a,b){return order[a.st]-order[b.st];});
}

function renderTabs(){
  return '<div style="display:flex;gap:0;margin-bottom:1.5rem;border-bottom:2px solid #eee">'
    +'<button onclick="G.tab=\'clients\';render()" style="padding:10px 20px;border:none;background:none;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;border-bottom:'+(G.tab==='clients'?'2px solid #1a1a1a':'2px solid transparent')+';margin-bottom:-2px;color:'+(G.tab==='clients'?'#1a1a1a':'#888')+'">Clients</button>'
    +'<button onclick="G.tab=\'students\';if(!G.students.length)doStudentSync();render()" style="padding:10px 20px;border:none;background:none;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;border-bottom:'+(G.tab==='students'?'2px solid #1a1a1a':'2px solid transparent')+';margin-bottom:-2px;color:'+(G.tab==='students'?'#1a1a1a':'#888')+'">Students</button>'
    +'</div>';
}
function renderStudentList(){
  var sb='<button class="pri" onclick="doStudentSync()" '+(G.studentSyncing?'disabled':'')+'>'+(G.studentSyncing?'Syncing...':'Sync Students')+'</button>';
  var out=renderTabs();
  out+='<div class="hdr"><div><h1>Students</h1><p class="sub">'+G.students.length+' students</p></div><div class="hdr-right">'+(G.studentSyncedAt?'<div class="sync-info">Last synced<br>'+ago(G.studentSyncedAt)+'</div>':'')+sb+'</div></div>';
  if(!G.students.length){out+='<div class="empty dashed"><p style="margin-bottom:14px">No students yet.</p>'+sb+'</div>';return out;}
  out+='<div class="filters"><div class="srch"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input value="'+esc(G.studentQ)+'" oninput="G.studentQ=this.value;render()" placeholder="Search students..." /></div></div>';
  var list=G.students.filter(function(s){return !G.studentQ||s.name.toLowerCase().includes(G.studentQ.toLowerCase());});
  out+='<div class="cards">';
  for(var i=0;i<list.length;i++){
    var s=list[i];
    var pending=(s.tasks||[]).filter(function(t){return !t.done;});
    out+='<div class="card" onclick="G.studentSel=\''+s.id+'\';G.studentView=\'detail\';G.newTask={a:\'\',n:\'\'};render()">';
    out+='<div class="card-top"><div><div class="card-name">'+esc(s.name)+'</div>';
    out+='<div class="card-meta"><span>'+s.appointments.length+' session'+(s.appointments.length!==1?'s':'')+'</span>';
    if(s.appointments.length>0)out+='<span>Last: '+fmtDate(s.appointments[0].date)+'</span>';
    out+='</div></div>';
    out+='<div class="card-right"><span style="font-size:12px;color:#888">'+pending.length+' task'+(pending.length!==1?'s':'')+' pending</span></div></div>';
    if(pending.length>0){
      out+='<div class="card-tasks">';
      for(var t=0;t<pending.length;t++){
        var tk=pending[t];
        out+='<div class="task-row"><span class="task-tag tag-'+(tk.assignee==='Felicity'?'felicity':'annie')+'">'+esc(tk.assignee)+'</span><span style="flex:1;color:#555">'+esc(tk.note)+'</span></div>';
      }
      out+='</div>';
    }
    out+='</div>';
  }
  out+='</div>';
  return out;
}
function renderStudentDetail(){
  var s=G.students.find(function(x){return x.id===G.studentSel;});
  if(!s)return renderTabs()+'<div class="empty">Not found.</div>';
  var tasks=s.tasks||[];
  var out=renderTabs();
  out+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px">';
  out+='<button class="back" style="margin:0" onclick="G.studentView=\'list\';render()">Back to students</button>';
  out+='<button class="danger" onclick="doRemoveStudent(\''+s.id+'\')" style="margin-left:8px">Remove student</button>';
  out+='</div>';
  out+='<div class="det-box">';
  out+='<h2 style="font-size:18px;font-weight:600;margin-bottom:4px">'+esc(s.name)+'</h2>';
  out+='<div class="mini-grid">';
  out+='<div class="mini"><p>Total sessions</p><p>'+s.appointments.length+'</p></div>';
  out+='<div class="mini"><p>Last session</p><p>'+(s.appointments.length?fmtDate(s.appointments[0].date):'-')+'</p></div>';
  out+='<div class="mini"><p>Tasks pending</p><p>'+tasks.filter(function(t){return !t.done;}).length+'</p></div>';
  out+='</div></div>';
  out+='<div class="section-box"><h3>Tasks</h3>';
  for(var ti=0;ti<tasks.length;ti++){
    var tk=tasks[ti];
    out+='<div class="etask etask-'+(tk.assignee==='Felicity'?'f':'a')+'" style="'+(tk.done?'opacity:.5':'')+'"><span class="task-tag tag-'+(tk.assignee==='Felicity'?'felicity':'annie')+'">'+esc(tk.assignee)+'</span>';
    out+='<span style="flex:1;font-size:13px;'+(tk.done?'text-decoration:line-through;color:#aaa':'color:#333')+'">'+esc(tk.note)+'</span>';
    out+='<button class="done-btn" onclick="event.stopPropagation();doToggleStudentTask(\''+s.id+'\',\''+tk.id+'\')">'+(tk.done?'Undo':'Done')+'</button>';
    out+='<button class="done-btn" style="color:#b32020" onclick="event.stopPropagation();doRemoveStudentTask(\''+s.id+'\',\''+tk.id+'\')">x</button>';
    out+='</div>';
  }
  out+='<div style="padding:12px;background:#f7f7f5;border-radius:8px"><div class="assignee-btns">';
  out+='<button class="assignee-btn '+(G.newTask.a==='Felicity'?'sel-f':'')+'" onclick="G.newTask.a=\'Felicity\';render()">Felicity</button>';
  out+='<button class="assignee-btn '+(G.newTask.a==='Annie'?'sel-a':'')+'" onclick="G.newTask.a=\'Annie\';render()">Annie</button>';
  out+='</div><textarea placeholder="e.g. Module 3 marked, Case study 2 pending..." oninput="G.newTask.n=this.value">'+esc(G.newTask.n)+'</textarea>';
  out+='<button class="pri" onclick="doSaveStudentTask()" '+(G.newTask.a?'':'disabled')+' style="margin-top:10px;width:100%;justify-content:center">Add task</button>';
  out+='</div></div>';
  out+='<h3 class="sec">Session history ('+s.appointments.length+')</h3>';
  if(!s.appointments.length){out+='<div class="empty dashed">No sessions found.</div>';}
  else{
    for(var ai=0;ai<s.appointments.length;ai++){
      var ap=s.appointments[ai];
      out+='<div class="ch-item"><div class="ch-icon '+(ap.isCheckin?'ch-call':'ch-appt')+'">'+(ap.isCheckin?'Call':'Session')+'</div>';
      out+='<div style="flex:1"><div style="display:flex;justify-content:space-between">';
      out+='<span class="ch-name">'+(ap.isCheckin?'Check-in call':'Mentoring session')+'</span>';
      out+='<span class="ch-date">'+fmtDate(ap.date)+'</span></div></div></div>';
    }
  }
  return out;
}
function renderList(){
  var tabs=renderTabs();
  var cnt=counts();
  var list=getList();
  var sb='<button class="pri" id="sbtn" onclick="doSync()">'+(G.syncing?'Syncing...':'Sync from Splose')+'</button>';
  var out=tabs+'<div class="hdr"<div><h1>Follow-up tracker</h1><p class="sub">'+G.clients.length+' clients</p></div>';
  out+='<div class="hdr-right">'+(G.syncedAt?'<div class="sync-info">Last synced<br>'+ago(G.syncedAt)+'</div>':'')+sb+'</div></div>';
  if(G.error)out+='<div class="err">Error: '+esc(G.error)+'</div>';
  if(G.clients.length===0&&!G.error){out+='<div class="empty dashed"><p style="margin-bottom:14px">No data yet.</p>'+sb+'</div>';return out;}
  out+='<div class="stats">';
  var sts=[{k:'checkin',l:'Check-in needed'},{k:'discharge',l:'Discharge'},{k:'rebook',l:'Rebook needed'},{k:'active',l:'Active'}];
  for(var i=0;i<sts.length;i++){
    var s=sts[i];
    out+='<div class="stat'+(G.filt===s.k?' on':'')+'" onclick="G.filt=\''+s.k+'\';render()">';
    out+='<div class="stat-lbl">'+s.l+'</div><div class="stat-n">'+cnt[s.k]+'</div></div>';
  }
  out+='</div>';
  out+='<div class="filters"><div class="srch"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>';
  out+='<input value="'+esc(G.q)+'" oninput="G.q=this.value;render()" placeholder="Search..."/></div>';
  var fs=['all','checkin','discharge','rebook','active'];
  for(var j=0;j<fs.length;j++){
    var f=fs[j];
    out+='<button class="fb'+(G.filt===f?' on':'')+'" onclick="G.filt=\''+f+'\';render()">'+(f==='all'?'All':SL[f])+'</button>';
  }
  out+='</div>';
  if(list.length===0){out+='<div class="empty">No clients match.</div>';return out;}
  out+='<div class="cards">';
  for(var k=0;k<list.length;k++){
    var c=list[k];
    var left=bizLeft(c.end);
    var isM=!!G.manual[c.id];
    var pendingTasks=(c.tasks||[]);
    out+='<div class="card" onclick="G.sel=\''+c.id+'\';G.view=\'detail\';G.newTask={a:\'\',n:\'\'};render()">';
    out+='<div class="card-top"><div>';
    out+='<div class="card-name">'+esc(c.name)+(isM?' <span style="font-size:11px;color:#0369a1">(manual)</span>':'')+'</div>';
    out+='<div class="card-meta">'+(c.practitioner?'<span>'+esc(c.practitioner)+'</span>':'');
    out+=(c.lastRealAppt?'<span>Last appt: '+fmtDate(c.lastRealAppt)+'</span>':'<span>No appointments</span>')+'</div></div>';
    out+='<div class="card-right"><span class="badge '+SBC[c.st]+'">'+SL[c.st]+'</span>';
    out+='<div class="card-days">';
    if(c.st==='discharge')out+='Support ended '+fmtDate(c.end);
    else if(c.st==='rebook')out+='No confirmed appointment';
    else if(c.end)out+=Math.max(0,left)+' day'+(left!==1?'s':'')+' left';
    out+='</div></div></div>';
    if(pendingTasks.length>0){
      out+='<div class="card-tasks">';
      for(var t=0;t<pendingTasks.length;t++){
        var tk=pendingTasks[t];
        out+='<div class="task-row"><span class="task-tag tag-'+(tk.a==='Felicity'?'felicity':'annie')+'">'+esc(tk.a)+'</span>';
        out+='<span style="flex:1;color:'+(tk.done?'#aaa':'#555')+';'+(tk.done?'text-decoration:line-through;':'')+'">'+esc(tk.n)+'</span></div>';
      }
      out+='</div>';
    }
    out+='</div>';
  }
  out+='</div>';
  return out;
}

function renderDetail(){
  var c=G.clients.find(function(x){return x.id===G.sel;});
  if(!c)return '<div class="empty">Not found.</div>';
  var left=bizLeft(c.end);
  var pct=c.st==='discharge'?100:c.st==='rebook'?0:Math.max(5,Math.round(((10-Math.max(0,left))/10)*100));
  var appts=c.appointments||[];
  var realAppts=appts.filter(function(a){return !a.isCheckin;});
  var tasks=c.tasks||[];
  var isM=!!G.manual[c.id];
  var out='';
  out+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px">';
  out+='<button class="back" onclick="G.view=\'list\';render()">Back to all clients</button>';
  out+='<div style="display:flex;gap:8px">';
  out+='<button class="pri" onclick="doSync()">'+(G.syncing?'Syncing...':'Refresh')+'</button>';
  out+='<button class="danger" onclick="doRemoveClient(\''+c.id+'\')">Remove client</button>';
  out+='</div></div>';
  if(G.error)out+='<div class="err">'+esc(G.error)+'</div>';
  out+='<div class="det-box">';
  out+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:10px">';
  out+='<div><h2 style="font-size:18px;font-weight:600;margin-bottom:4px">'+esc(c.name)+'</h2>';
  if(c.practitioner)out+='<p class="sub">'+esc(c.practitioner)+'</p>';
  out+='</div><span class="badge '+SBC[c.st]+'">'+SL[c.st]+(isM?' (manual)':'')+'</span></div>';
  out+='<div class="mini-grid">';
  out+='<div class="mini"><p>Last appointment</p><p>'+fmtDate(c.lastRealAppt)+'</p></div>';
  out+='<div class="mini"><p>Support ends</p><p>'+(c.end?fmtDate(c.end):'-')+'</p></div>';
  out+='<div class="mini"><p>Contacts</p><p>'+realAppts.length+' appts, '+(appts.length-realAppts.length)+' calls</p></div>';
  out+='</div>';
  if(c.end){
    out+='<div class="prog-row"><span>Follow-up period</span>';
    out+='<span style="color:'+SC[c.st]+';font-weight:600">';
    if(c.st==='discharge')out+='Period ended';
    else if(c.st==='rebook')out+='No active period';
    else out+=Math.max(0,left)+' business day'+(left!==1?'s':'')+' remaining';
    out+='</span></div>';
    out+='<div class="prog"><div class="prog-fill" style="width:'+pct+'%;background:'+SC[c.st]+'"></div></div>';
  }
  out+='</div>';
  out+='<div class="section-box"><h3>Override status'+(isM?' <span style="font-size:12px;color:#0369a1;font-weight:400">(resets on next sync)</span>':'')+'</h3>';
  out+='<div class="s-opts">';
  var statOpts=['active','checkin','discharge','rebook'];
  for(var si=0;si<statOpts.length;si++){
    var so=statOpts[si];
    out+='<button class="s-opt'+(c.st===so?' s-on':'')+'" onclick="doManualStatus(\''+c.id+'\',\''+so+'\')">'+SL[so]+'</button>';
  }
  out+='</div></div>';
  out+='<div class="section-box"><h3>Tasks</h3>';
  for(var ti=0;ti<tasks.length;ti++){
    var tk=tasks[ti];
    out+='<div class="etask etask-'+(tk.a==='Felicity'?'f':'a')+'" style="'+(tk.done?'opacity:.5':'')+'"><span class="task-tag tag-'+(tk.a==='Felicity'?'felicity':'annie')+'">'+esc(tk.a)+'</span>';
    out+='<span style="flex:1;font-size:13px;'+(tk.done?'text-decoration:line-through;color:#aaa':'color:#333')+'">'+esc(tk.n)+'</span>';
    out+='<button class="done-btn" onclick="doToggleTask(\''+c.id+'\',\''+tk.id+'\')">'+(tk.done?'Undo':'Done')+'</button>';
    out+='<button class="done-btn" style="color:#b32020" onclick="doRemoveTask(\''+c.id+'\',\''+tk.id+'\')">x</button>';
    out+='</div>';
  }
  out+='<div style="padding:12px;background:#f7f7f5;border-radius:8px">';
  out+='<div class="assignee-btns">';
  out+='<button class="assignee-btn'+(G.newTask.a==='Felicity'?' sel-f':'')+'" onclick="G.newTask.a=\'Felicity\';render()">Felicity</button>';
  out+='<button class="assignee-btn'+(G.newTask.a==='Annie'?' sel-a':'')+'" onclick="G.newTask.a=\'Annie\';render()">Annie</button>';
  out+='</div>';
  out+='<textarea placeholder="Describe the task..." oninput="G.newTask.n=this.value">'+esc(G.newTask.n)+'</textarea>';
  out+='<button class="pri" onclick="doSaveTask()" '+(G.newTask.a?'':'disabled')+' style="margin-top:10px;width:100%;justify-content:center">Add task</button>';
  out+='</div></div>';
  out+='<h3 class="sec">Contact history ('+appts.length+')</h3>';
  if(appts.length===0){out+='<div class="empty dashed">No contacts.</div>';}
  else{
    for(var ai=0;ai<appts.length;ai++){
      var ap=appts[ai];
      var isCall=ap.isCheckin;
      var isLatest=!isCall&&realAppts.length>0&&ap.id===realAppts[0].id;
      out+='<div class="ch-item">';
      out+='<div class="ch-icon '+(isCall?'ch-call':'ch-appt')+'">'+(isCall?'Call':'Appt')+'</div>';
      out+='<div style="flex:1"><div style="display:flex;justify-content:space-between">';
      out+='<span class="ch-name">'+(isCall?'Check-in call':'Appointment');
      if(isCall)out+='<span class="call-pill">call only</span>';
      if(isLatest)out+='<span class="latest-pill">latest</span>';
      out+='</span><span class="ch-date">'+fmtDate(ap.date)+'</span></div>';
      if(isLatest&&c.end)out+='<p class="ch-sub" style="color:'+SC[c.st]+';font-weight:500">Support: '+fmtDate(ap.date)+' to '+fmtDate(c.end)+'</p>';
      out+='</div></div>';
    }
  }
  return out;
}

function render(){
  var html;
  if(G.tab==='students'){
    html=G.studentView==='detail'?renderStudentDetail():renderStudentList();
  } else {
    html=G.view==='detail'?renderDetail():renderList();
  }
  document.getElementById('root').innerHTML=html;
}

loadLocal();
doSync();
</script>
</body>
</html>
